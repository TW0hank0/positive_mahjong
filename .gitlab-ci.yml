stages:
  - sync
  - deploy

sync_to_mirrors:
  stage: sync
  image: alpine:latest
  before_script:
    # 安裝必要工具
    - apk add --no-cache git openssh-client curl bash
    - curl -s https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer | bash

    # 啟動 SSH Agent 並載入安全檔案中的私鑰
    - eval $(ssh-agent -s) > /dev/null
    #
    - chmod 400 .secure_files/sync_bot
    - ssh-add .secure_files/sync_bot > /dev/null 2>&1

    # 建立信任主機
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan github.com codeberg.org >> ~/.ssh/known_hosts 2>/dev/null

    # 設定 Bot 身份
    - git config --global user.email "TW0hank0@noreply.codeberg.org"
    - git config --global user.name "sync-bot-TW0hank0"

    - git clone https://gitlab.com/TW0hank0/positive_mahjong.git

  script:
    - cd positive_mahjong

    # 設定遠端並推送
    - git remote add github git@github.com:TW0hank0/positive_mahjong.git
    - git remote add codeberg git@codeberg.org:TW0hank0/positive_mahjong.git

    # 鏡像同步
    #- git push codeberg --all
    #- git push codeberg --tags
    - git push codeberg --force
    #- git push github --all
    #- git push github --tags
    - git push github --force

    - cd ..

  rules:
    - if: $CI_COMMIT_BRANCH == "master"

pages:
  stage: deploy
  image: alpine:latest
  pages:
    # The folder that contains the files to be exposed at the Page URL
    publish: docs/book
  artifacts:
    paths:
      - docs/book
  rules:
    # This ensures that only pushes to the default branch will trigger
    # a pages deploy
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  # Functions that should be executed before the build script is run
  before_script:
    - apk add --no-cache git curl bash llvm gcc clang
    - curl https://sh.rustup.rs -o rustup-inst.sh
    - sh rustup-inst.sh -y
    - . "$HOME/.cargo/env"
    - cargo install cargo-about --features cli
    - cargo install mdbook
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.local/bin/env
    - uv python install cpython-3.14
  script:
    - uv run scripts/build_license.py
    - cd docs && mdbook build && cd ..
