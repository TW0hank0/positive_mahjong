[package]
name = "pmj_client"
version = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
#build = "build.rs"
default-run = "pmj_client"
license = { workspace = true }

[[bin]]
name = "pmj_client"
path = "src/main.rs"

[lib]
crate-type = ["lib", "cdylib"]
name = "pmj_client_lib"

[dependencies]
reqwest = { workspace = true }
pmj_shared = { workspace = true }
slint = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { version = "0.2" }
console_error_panic_hook = "0.1.5"

[build-dependencies]
#cargo_metadata = "0.19"
#heck = "0.5"
#positive_tool_rs = { git = "https://github.com/TW0hank0/positive_tool_rs" }
#serde = { version = "1.0.228", features = ["serde_derive"] }
#serde_json = "1.0.149"
slint-build = "1.14.1"

[package.metadata.android]
package = "io.github.positive_mahjong.tw0hank0"
apk_name = "pmj_client"
build_targets = ["armv7-linux-androideabi", "aarch64-linux-android"]

[package.metadata.android.application]
label = "PositiveMahjong Client"

[package.metadata.android.sdk]
min_sdk_version = 23
target_sdk_version = 35
max_sdk_version = 36
