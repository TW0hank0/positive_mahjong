name: docs-build

on:
  push:
    paths-ignore:
      - "README.md"
      - "READMEs/**"
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: check uv install
        run: |
          uv self version

      - name: prepare dep
        run: |
          uv venv
          uv pip install mkdocs mkdocs-material

      - name: deploy
        run: mkdocs gh-deploy --force
